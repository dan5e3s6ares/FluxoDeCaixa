# CloudNativePG cluster — single instance, schemas via pg-bootstrap job (doc 07).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: fluxo-pg
  labels:
    app.kubernetes.io/name: fluxo-pg
    app.kubernetes.io/part-of: fluxo-caixa
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4-1
  storage:
    size: 10Gi
    storageClass: local-path
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  bootstrap:
    initdb:
      database: fluxo
      owner: fluxo
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: 256MB
