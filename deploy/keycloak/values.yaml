# Keycloak — doc 07 (namespace security, realm fluxo-caixa via bootstrap Job)
# Uses shared CNPG PostgreSQL (fluxo-pg) instead of the embedded subchart — faster
# make start on dev VMs and avoids a second PostgreSQL pod in security/.
global:
  security:
    allowInsecureImages: true

image:
  repository: bitnamilegacy/keycloak

auth:
  adminUser: admin
  existingSecret: fluxo-keycloak
  passwordSecretKey: admin-password

# Quarkus dev mode (production=false) runs `kc.sh start-dev` and skips the slow build step.
# make start targets dev VMs; OIDC/realm bootstrap works the same after /health/ready.
production: false
proxy: edge

# Quarkus health is off by default in the Bitnami image; probes and wait-healthy.sh use
# /health/ready on the main HTTP port (8080), not the management port (9000).
extraEnvVars:
  - name: KC_HEALTH_ENABLED
    value: "true"
  - name: KC_HTTP_MANAGEMENT_HEALTH_ENABLED
    value: "false"

# Single-replica dev stack: local cache avoids jdbc-ping / headless service on boot.
cache:
  enabled: false

# Bitnami defaults probe /realms/master for readiness; that stays false while Quarkus
# is still booting and makes helm --wait look hung. Use /health/ready like wait-healthy.sh.
customStartupProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 36
  successThreshold: 1
customReadinessProbe:
  httpGet:
    path: /health/ready
    port: http
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1
customLivenessProbe:
  tcpSocket:
    port: http
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

# Custom probes replace the chart defaults; keep built-ins off to avoid ambiguity.
startupProbe:
  enabled: false
readinessProbe:
  enabled: false
livenessProbe:
  enabled: false

resources:
  requests:
    cpu: 250m
    memory: 768Mi
  limits:
    cpu: 500m
    memory: 1Gi

service:
  type: ClusterIP
  ports:
    http: 8080

ingress:
  enabled: false

metrics:
  enabled: false

postgresql:
  enabled: false

externalDatabase:
  host: fluxo-pg-rw.database.svc.cluster.local
  port: 5432
  user: fluxo
  database: keycloak
  existingSecret: fluxo-keycloak
  existingSecretUserKey: db-user
  existingSecretPasswordKey: db-password
