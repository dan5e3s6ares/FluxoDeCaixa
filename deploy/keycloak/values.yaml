# Keycloak — doc 07 (namespace security, realm fluxo-caixa via bootstrap Job)
# Uses shared CNPG PostgreSQL (fluxo-pg) instead of the embedded subchart — faster
# make start on dev VMs and avoids a second PostgreSQL pod in security/.
global:
  security:
    allowInsecureImages: true

image:
  repository: bitnamilegacy/keycloak

auth:
  adminUser: admin
  existingSecret: fluxo-keycloak
  passwordSecretKey: admin-password

production: true
proxy: edge

# Keycloak production boot can take several minutes on a dev VM; startupProbe keeps
# helm --wait from failing while readinessProbe checks /realms/master too early.
startupProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 60
  successThreshold: 1
readinessProbe:
  enabled: true
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1
livenessProbe:
  enabled: true
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

resources:
  requests:
    cpu: 250m
    memory: 768Mi
  limits:
    cpu: 500m
    memory: 1Gi

service:
  type: ClusterIP

ingress:
  enabled: false

metrics:
  enabled: false

postgresql:
  enabled: false

externalDatabase:
  host: fluxo-pg-rw.database.svc.cluster.local
  port: 5432
  user: fluxo
  database: keycloak
  existingSecret: fluxo-keycloak
  existingSecretUserKey: db-user
  existingSecretPasswordKey: db-password
