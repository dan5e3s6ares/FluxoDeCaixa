# Keycloak — doc 07 (namespace security, realm fluxo-caixa via bootstrap Job)
# Same bitnamilegacy workaround as deploy/redis/values.yaml (embedded PostgreSQL subchart).
global:
  security:
    allowInsecureImages: true

image:
  repository: bitnamilegacy/keycloak

auth:
  adminUser: admin
  existingSecret: fluxo-keycloak
  passwordSecretKey: admin-password

production: true
proxy: edge

# Production Keycloak + embedded PostgreSQL can take several minutes on a dev VM;
# startupProbe avoids helm --wait hanging while readinessProbe flaps early.
startupProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 60
  successThreshold: 1
readinessProbe:
  enabled: true
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1
livenessProbe:
  enabled: true
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

resources:
  requests:
    cpu: 250m
    memory: 768Mi
  limits:
    cpu: 500m
    memory: 1Gi

service:
  type: ClusterIP

ingress:
  enabled: false

metrics:
  enabled: false

postgresql:
  enabled: true
  image:
    repository: bitnamilegacy/postgresql
  volumePermissions:
    image:
      repository: bitnamilegacy/os-shell
  auth:
    existingSecret: fluxo-keycloak
    username: keycloak
    secretKeys:
      userPasswordKey: postgres-password
      adminPasswordKey: postgres-password
    database: keycloak
  primary:
    persistence:
      enabled: true
      size: 2Gi
      storageClass: local-path
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
