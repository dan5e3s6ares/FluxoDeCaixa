apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-bootstrap
  labels:
    app.kubernetes.io/name: keycloak-bootstrap
    app.kubernetes.io/part-of: fluxo-caixa
spec:
  ttlSecondsAfterFinished: 300
  activeDeadlineSeconds: 600
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: curlimages/curl:8.12.1
          command: ["/bin/sh", "/scripts/bootstrap.sh"]
          env:
            - name: KEYCLOAK_URL
              value: http://keycloak.security.svc.cluster.local:8080
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fluxo-keycloak
                  key: admin-password
            - name: REALM_NAME
              value: fluxo-caixa
            - name: KEYCLOAK_WAIT_ATTEMPTS
              value: "90"
            - name: KEYCLOAK_WAIT_DELAY
              value: "3"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: realm
              mountPath: /realm
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: scripts
          configMap:
            name: keycloak-bootstrap
            defaultMode: 0555
        - name: realm
          configMap:
            name: keycloak-realm
            defaultMode: 0444
