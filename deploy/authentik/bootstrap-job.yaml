apiVersion: batch/v1
kind: Job
metadata:
  name: authentik-bootstrap
  labels:
    app.kubernetes.io/name: authentik-bootstrap
    app.kubernetes.io/part-of: fluxo-caixa
spec:
  ttlSecondsAfterFinished: 300
  activeDeadlineSeconds: 1800
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authentik-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          # curlimages/curl is curl-only (no grep/sed); bootstrap.sh needs a full shell toolchain.
          image: alpine:3.20.3
          command: ["/bin/sh", "-ec"]
          args:
            - |
              apk add --no-cache curl >/dev/null
              exec /bin/sh /scripts/bootstrap.sh
          env:
            - name: AUTHENTIK_URL
              value: http://authentik-server.security.svc.cluster.local:9000
            - name: APP_SLUG
              value: fluxo-caixa
            - name: AUTHENTIK_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fluxo-authentik
                  key: AUTHENTIK_BOOTSTRAP_TOKEN
            # deploy-platform.sh already waits for Authentik health; skip redundant wait when ready.
            - name: AUTHENTIK_SKIP_READY_WAIT
              value: "1"
            # deploy-platform.sh validates OIDC discovery after the Job completes.
            - name: AUTHENTIK_SKIP_JWKS_WAIT
              value: "1"
            # AUTHENTIK_WAIT_* only apply when SKIP_READY_WAIT=1 but the one-shot health check fails.
            - name: AUTHENTIK_WAIT_ATTEMPTS
              value: "24"
            - name: AUTHENTIK_WAIT_DELAY
              value: "5"
            - name: OAUTH2_DEFAULTS_WAIT_ATTEMPTS
              value: "24"
            - name: OAUTH2_DEFAULTS_WAIT_DELAY
              value: "5"
            - name: MAPPING_WAIT_ATTEMPTS
              value: "24"
            - name: MAPPING_WAIT_DELAY
              value: "5"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 200m
              memory: 192Mi
      volumes:
        - name: scripts
          configMap:
            name: authentik-bootstrap
            defaultMode: 0555
