# Authentik IdP — doc simplificacao-de-projeto (namespace security, CNPG fluxo-pg).
# Chart: https://charts.goauthentik.io (goauthentik/authentik)
#
# Expected secrets in namespace `security`:
#   fluxo-authentik — AUTHENTIK_SECRET_KEY, AUTHENTIK_BOOTSTRAP_TOKEN, AUTHENTIK_BOOTSTRAP_PASSWORD,
#                     AUTHENTIK_POSTGRESQL__* (required when existingSecret is set; chart ignores values authentik.postgresql)
#   fluxo-authentik-pg — username, password (same owner as fluxo-pg-app; DB `authentik` via pg-bootstrap)
#
# Issuer (in-cluster): http://authentik-server.security.svc.cluster.local:9000/application/o/fluxo-caixa/

authentik:
  error_reporting:
    enabled: false
  existingSecret:
    secretName: fluxo-authentik
  # NOTE: Ignored while existingSecret is set — the chart reads AUTHENTIK_POSTGRESQL__* from
  # fluxo-authentik via envFrom. These values are documentation only; removing existingSecret
  # switches connection here (file:///pg-creds/ URIs require server/worker volumeMounts below).
  postgresql:
    host: fluxo-pg-rw.database.svc.cluster.local
    name: authentik
    user: file:///pg-creds/username
    password: file:///pg-creds/password
    port: 5432

postgresql:
  enabled: false

server:
  replicas: 1
  # Do not set AUTHENTIK_LISTEN__HTTP in server.env — chart 2025.12.4 injects it from
  # server.containerPorts.http (default 9000); a duplicate env entry triggers kubectl
  # "hides previous definition" warnings and can break server-side apply.
  containerPorts:
    http: 9000
  service:
    type: ClusterIP
    servicePortHttp: 9000
    servicePortHttpName: http
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1536Mi
  volumes:
    - name: pg-creds
      secret:
        secretName: fluxo-authentik-pg
  volumeMounts:
    - name: pg-creds
      mountPath: /pg-creds
      readOnly: true

worker:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1536Mi
  volumes:
    - name: pg-creds
      secret:
        secretName: fluxo-authentik-pg
  volumeMounts:
    - name: pg-creds
      mountPath: /pg-creds
      readOnly: true
