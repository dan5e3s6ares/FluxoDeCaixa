apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: krakend-tls
  namespace: gateway
spec:
  secretName: krakend-tls
  duration: 8760h
  renewBefore: 720h
  dnsNames:
    - localhost
    - krakend
    - krakend.gateway.svc
    - krakend.gateway.svc.cluster.local
  issuerRef:
    name: fluxo-caixa-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
