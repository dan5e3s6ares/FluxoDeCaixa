# Redis standalone — doc 07 (namespace cache, volátil, maxmemory 256MB allkeys-lru)
# Bitnami moved most docker.io/bitnami tags to bitnamilegacy (Aug 2025); without this,
# helm --wait hangs on ImagePullBackOff during make start.
global:
  security:
    allowInsecureImages: true

image:
  repository: bitnamilegacy/redis

architecture: standalone

auth:
  enabled: true
  existingSecret: fluxo-redis
  existingSecretPasswordKey: redis-password

master:
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

replica:
  replicaCount: 0

metrics:
  enabled: false

commonConfiguration: |-
  appendonly no
  save ""
  maxmemory 256mb
  maxmemory-policy allkeys-lru
