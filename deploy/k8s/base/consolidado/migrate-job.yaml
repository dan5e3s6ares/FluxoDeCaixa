# Alembic migrations for schema consolidado (doc 07). Applied via kubectl apply before app rollout.
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate-consolidado
  labels:
    app.kubernetes.io/name: db-migrate-consolidado
    app.kubernetes.io/part-of: fluxo-caixa
spec:
  ttlSecondsAfterFinished: 300
  activeDeadlineSeconds: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrate-consolidado
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: fluxo-caixa/consolidado:dev
          imagePullPolicy: IfNotPresent
          command:
            - uv
            - run
            - alembic
            - upgrade
            - head
          envFrom:
            - configMapRef:
                name: svc-consolidado-connection
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fluxo-pg-app
                  key: database-url-consolidado
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: fluxo-redis
                  key: redis-url
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
