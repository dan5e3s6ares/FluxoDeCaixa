# Non-sensitive env for svc-consulta (doc 07). Secrets: fluxo-pg-app, fluxo-redis.
apiVersion: v1
kind: ConfigMap
metadata:
  name: svc-consulta-connection
  labels:
    app.kubernetes.io/name: svc-consulta
    app.kubernetes.io/part-of: fluxo-caixa
data:
  NATS_URL: nats://nats.messaging.svc.cluster.local:4222
  # Ory Hydra OIDC stubs — filled by deploy-platform.sh
  OIDC_ISSUER: http://hydra-public.security.svc.cluster.local:4444/
  OIDC_CLIENT_ID: svc-consulta
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4317
  OTEL_SERVICE_NAME: svc-consulta
  LOG_LEVEL: INFO
  ENVIRONMENT: dev
