# svc-lancamentos API — doc 07 (resources, envFrom, Harbor image)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-lancamentos
  labels:
    app.kubernetes.io/name: svc-lancamentos
    app.kubernetes.io/part-of: fluxo-caixa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-lancamentos
  template:
    metadata:
      labels:
        app: svc-lancamentos
        app.kubernetes.io/name: svc-lancamentos
        app.kubernetes.io/part-of: fluxo-caixa
    spec:
      containers:
        - name: lancamentos
          image: harbor.local:8080/fluxo-caixa/svc-lancamentos:main-0000000
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: svc-lancamentos-connection
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fluxo-pg-app
                  key: database-url-lancamentos
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: fluxo-redis
                  key: redis-url
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
