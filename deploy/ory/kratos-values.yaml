# Ory Kratos — identity (namespace security, CNPG fluxo-pg).
# Chart: https://k8s.ory.sh/helm/charts (ory/kratos)
#
# Expected secrets in namespace `security`:
#   fluxo-kratos — dsn (URL-encoded CNPG creds), secretsDefault, secretsCookie, secretsCipher
#   fluxo-kratos-pg — username, password (CNPG app owner; DB `kratos` via pg-bootstrap)
#
# Public API (in-cluster): http://kratos-public.security.svc.cluster.local/

kratos:
  development: false
  automigration:
    enabled: true
    type: job
  config:
    dsn: memory
    serve:
      public:
        base_url: http://kratos-public.security.svc.cluster.local/
        port: 4433
      admin:
        base_url: http://kratos-admin.security.svc.cluster.local/
        port: 4434
    identity:
      default_schema_id: default
      schemas:
        - id: default
          url: file:///etc/config/identity.default.schema.json
    selfservice:
      default_browser_return_url: http://127.0.0.1:4455/
      flows:
        login:
          ui_url: http://127.0.0.1:4455/login
        registration:
          ui_url: http://127.0.0.1:4455/registration
    courier:
      smtp:
        connection_uri: smtps://test:test@mailslurper:1025/?skip_ssl_verify=true
    secrets: {}

  identitySchemas:
    identity.default.schema.json: |
      {
        "$id": "https://schemas.ory.sh/presets/kratos/identity.email.schema.json",
        "$schema": "http://json-schema.org/draft-07/schema#",
        "title": "Fluxo Caixa Identity",
        "type": "object",
        "properties": {
          "traits": {
            "type": "object",
            "properties": {
              "email": {
                "type": "string",
                "format": "email",
                "title": "E-Mail",
                "ory.sh/kratos": {
                  "credentials": {
                    "password": { "identifier": true }
                  },
                  "recovery": { "via": "email" },
                  "verification": { "via": "email" }
                }
              },
              "merchant_id": {
                "type": "string",
                "format": "uuid",
                "title": "Merchant ID"
              }
            },
            "required": ["email"],
            "additionalProperties": false
          }
        }
      }

secret:
  enabled: false
  nameOverride: fluxo-kratos

deployment:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

service:
  public:
    port: 4433
  admin:
    port: 4434

courier:
  enabled: false
