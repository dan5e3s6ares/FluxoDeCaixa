apiVersion: batch/v1
kind: Job
metadata:
  name: ory-bootstrap
  labels:
    app.kubernetes.io/name: ory-bootstrap
    app.kubernetes.io/part-of: fluxo-caixa
spec:
  ttlSecondsAfterFinished: 300
  activeDeadlineSeconds: 1800
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ory-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: alpine:3.20.3
          command: ["/bin/sh", "-ec"]
          args:
            - |
              apk add --no-cache curl >/dev/null
              exec /bin/sh /scripts/bootstrap.sh
          env:
            - name: HYDRA_ADMIN_URL
              value: http://hydra-admin.security.svc.cluster.local:4445
            - name: HYDRA_PUBLIC_URL
              value: http://hydra-public.security.svc.cluster.local:4444
            - name: KRATOS_ADMIN_URL
              value: http://kratos-admin.security.svc.cluster.local:4434
            - name: DEFAULT_MERCHANT_ID
              value: "00000000-0000-4000-8000-000000000001"
            - name: REQUIRED_CLIENTS
              value: svc-lancamentos,svc-consolidado,svc-consulta
            - name: ORY_SKIP_READY_WAIT
              value: "1"
            - name: ORY_SKIP_JWKS_WAIT
              value: "1"
            - name: ORY_WAIT_ATTEMPTS
              value: "24"
            - name: ORY_WAIT_DELAY
              value: "5"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 200m
              memory: 192Mi
      volumes:
        - name: scripts
          configMap:
            name: ory-bootstrap
            defaultMode: 0555
