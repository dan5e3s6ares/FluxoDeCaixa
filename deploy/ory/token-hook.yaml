apiVersion: v1
kind: ConfigMap
metadata:
  name: ory-token-hook
  labels:
    app.kubernetes.io/name: ory-token-hook
    app.kubernetes.io/part-of: fluxo-caixa
data:
  token_hook.py: |
    #!/usr/bin/env python3
    """Hydra token hook — inject merchant_id and azp from OAuth2 client metadata."""
    import json
    from http.server import BaseHTTPRequestHandler, HTTPServer

    class TokenHookHandler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path in ("/health", "/healthz", "/ready"):
                self._json_response(200, {"status": "ok"})
                return
            self.send_error(404)

        def do_POST(self):
            length = int(self.headers.get("Content-Length", 0))
            raw = self.rfile.read(length) if length else b"{}"
            try:
                body = json.loads(raw.decode("utf-8") or "{}")
            except json.JSONDecodeError:
                self._json_response(400, {"error": "invalid json"})
                return

            client = body.get("client") or body.get("request", {}).get("client") or {}
            metadata = client.get("metadata") or {}
            merchant_id = metadata.get("merchant_id", "")
            client_id = client.get("client_id", "")

            self._json_response(
                200,
                {
                    "session": {
                        "access_token": {
                            "merchant_id": merchant_id,
                            "azp": client_id,
                        }
                    }
                },
            )

        def _json_response(self, code, payload):
            data = json.dumps(payload).encode("utf-8")
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(data)))
            self.end_headers()
            self.wfile.write(data)

        def log_message(self, fmt, *args):
            return

    if __name__ == "__main__":
        HTTPServer(("0.0.0.0", 8080), TokenHookHandler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ory-token-hook
  labels:
    app.kubernetes.io/name: ory-token-hook
    app.kubernetes.io/part-of: fluxo-caixa
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ory-token-hook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ory-token-hook
    spec:
      containers:
        - name: token-hook
          image: python:3.12-alpine
          command: ["python3", "/app/token_hook.py"]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: app
          configMap:
            name: ory-token-hook
            defaultMode: 0555
---
apiVersion: v1
kind: Service
metadata:
  name: ory-token-hook
  labels:
    app.kubernetes.io/name: ory-token-hook
    app.kubernetes.io/part-of: fluxo-caixa
spec:
  selector:
    app.kubernetes.io/name: ory-token-hook
  ports:
    - name: http
      port: 8080
      targetPort: http
