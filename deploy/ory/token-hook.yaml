apiVersion: apps/v1
kind: Deployment
metadata:
  name: ory-token-hook
  labels:
    app.kubernetes.io/name: ory-token-hook
    app.kubernetes.io/part-of: fluxo-caixa
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ory-token-hook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ory-token-hook
    spec:
      containers:
        - name: token-hook
          image: fluxo-caixa/ory-token-hook:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ory-token-hook
  labels:
    app.kubernetes.io/name: ory-token-hook
    app.kubernetes.io/part-of: fluxo-caixa
spec:
  selector:
    app.kubernetes.io/name: ory-token-hook
  ports:
    - name: http
      port: 8080
      targetPort: http
