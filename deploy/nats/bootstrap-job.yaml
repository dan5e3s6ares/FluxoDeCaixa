apiVersion: batch/v1
kind: Job
metadata:
  name: nats-bootstrap
  namespace: messaging
  labels:
    app.kubernetes.io/name: nats-bootstrap
    app.kubernetes.io/part-of: fluxo-caixa
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: natsio/nats-box:0.14.3
          command: ["/bin/sh", "/scripts/bootstrap.sh"]
          env:
            - name: NATS_URL
              value: nats://nats.messaging.svc.cluster.local:4222
            - name: NATS_WAIT_ATTEMPTS
              value: "60"
            - name: NATS_WAIT_DELAY
              value: "2"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: scripts
          configMap:
            name: nats-bootstrap
            defaultMode: 0555
