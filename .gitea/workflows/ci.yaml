# Gitea Actions CI — doc 07: lint → unit test → build → push Harbor → GitOps tag
# Path-filtered per service; PRs run lint+test only; main push deploys via ArgoCD.
name: CI

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "platform/shared/**"
      - ".gitea/workflows/**"
  pull_request:
    paths:
      - "services/**"
      - "platform/shared/**"
      - ".gitea/workflows/**"

env:
  # Default in-VM Harbor (harbor.local via /etc/hosts). Legacy: set repo variable
  # HARBOR_REGISTRY=192.168.68.100:8080 or export HARBOR_EXTERNAL for make start.
  HARBOR_REGISTRY: harbor.local:8080
  IMAGE_NAMESPACE: fluxo-caixa

jobs:
  detect:
    runs-on: self-hosted
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      lancamentos: ${{ steps.filter.outputs.lancamentos }}
      consolidado: ${{ steps.filter.outputs.consolidado }}
      consulta: ${{ steps.filter.outputs.consulta }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [ -n "${{ github.event.before }}" ] && \
               [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            BASE="${{ github.event.before }}"
          else
            BASE="$(git rev-parse "${{ github.sha }}~1" 2>/dev/null || echo "")"
          fi

          if [ -z "${BASE}" ]; then
            CHANGED="$(git ls-files)"
          else
            CHANGED="$(git diff --name-only "${BASE}" HEAD || true)"
          fi

          shared=false
          workflow=false
          echo "${CHANGED}" | grep -q '^platform/shared/' && shared=true
          echo "${CHANGED}" | grep -q '^\.gitea/workflows/' && workflow=true

          for svc in lancamentos consolidado consulta; do
            if ${shared} || ${workflow} || echo "${CHANGED}" | grep -q "^services/${svc}/"; then
              echo "${svc}=true" >> "${GITHUB_OUTPUT}"
            else
              echo "${svc}=false" >> "${GITHUB_OUTPUT}"
            fi
          done

      - id: set-matrix
        shell: bash
        env:
          LANCADOS: ${{ steps.filter.outputs.lancamentos }}
          CONSOLIDADO: ${{ steps.filter.outputs.consolidado }}
          CONSULTA: ${{ steps.filter.outputs.consulta }}
        run: |
          set -euo pipefail

          entries=()
          declare -A enabled=(
            [lancamentos]="${LANCADOS}"
            [consolidado]="${CONSOLIDADO}"
            [consulta]="${CONSULTA}"
          )
          declare -A image_names=(
            [lancamentos]=svc-lancamentos
            [consolidado]=consolidado
            [consulta]=consulta
          )

          for svc in lancamentos consolidado consulta; do
            if [ "${enabled[$svc]}" = "true" ]; then
              entries+=("{\"service\":\"${svc}\",\"image_name\":\"${image_names[$svc]}\"}")
            fi
          done

          if [ "${#entries[@]}" -eq 0 ]; then
            echo "matrix=[]" >> "${GITHUB_OUTPUT}"
          else
            matrix="[$(IFS=,; echo "${entries[*]}")]"
            echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"
          fi

  service:
    needs: detect
    if: needs.detect.outputs.matrix != '[]'
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Lint
        working-directory: services/${{ matrix.service }}
        run: |
          uv sync
          uv run --with ruff ruff check app tests --select E9,F63,F7,F82 --line-length 120

      - name: Unit tests
        working-directory: services/${{ matrix.service }}
        run: uv run pytest tests/unit

      - name: Build image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${HARBOR_REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.image_name }}:main-${SHORT_SHA}"
          podman build -f "services/${{ matrix.service }}/Dockerfile" -t "${IMAGE}" .

      - name: Push to Harbor
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${HARBOR_REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.image_name }}:main-${SHORT_SHA}"
          echo "${HARBOR_PASSWORD}" | podman login "${HARBOR_REGISTRY}" \
            -u "${HARBOR_USERNAME}" --password-stdin
          podman push "${IMAGE}"
          podman logout "${HARBOR_REGISTRY}"

  gitops:
    needs: [detect, service]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect.result == 'success' &&
      needs.service.result == 'success' &&
      needs.detect.outputs.matrix != '[]'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update GitOps manifests
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="main-${SHORT_SHA}"

          git config user.name "gitea-actions[bot]"
          git config user.email "actions@gitea.local"

          update_service() {
            local service_dir="$1"
            local image_name="$2"
            local deploy_dir="deploy/k8s/base/${service_dir}"
            local image_ref="${HARBOR_REGISTRY}/${IMAGE_NAMESPACE}/${image_name}"

            for manifest in "${deploy_dir}"/*.yaml; do
              [ -f "${manifest}" ] || continue
              if grep -q "${image_ref}:main-" "${manifest}"; then
                sed -i -E \
                  "s|(${image_ref}:)main-[a-f0-9]+|\1${TAG}|g" \
                  "${manifest}"
              fi
            done
          }

          if [ "${{ needs.detect.outputs.lancamentos }}" = "true" ]; then
            update_service lancamentos svc-lancamentos
          fi
          if [ "${{ needs.detect.outputs.consolidado }}" = "true" ]; then
            update_service consolidado consolidado
          fi
          if [ "${{ needs.detect.outputs.consulta }}" = "true" ]; then
            update_service consulta consulta
          fi

          if git diff --quiet; then
            echo "No manifest changes"
            exit 0
          fi

          git add deploy/k8s/base/
          git commit -m "ci: bump images to ${TAG} [skip ci]"

          SERVER="${{ github.server_url }}"
          SERVER="${SERVER#https://}"
          SERVER="${SERVER#http://}"
          REMOTE="https://oauth2:${GITEA_TOKEN}@${SERVER}/${{ github.repository }}.git"

          for attempt in 1 2 3 4 5; do
            if git push "${REMOTE}" HEAD:main; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}/5), rebasing onto origin/main..."
            git fetch "${REMOTE}" main
            git rebase FETCH_HEAD
          done

          echo "GitOps push failed after retries"
          exit 1
